---
aid: harbin-institute-of-technology
name: Harbin Institute of Technology
description: >-
  Harbin Institute of Technology (HIT) is a public research university in Harbin,
  Heilongjiang, China, founded in 1920 and overseen by the Ministry of Industry
  and Information Technology, with additional campuses in Weihai and Shenzhen. It
  is ranked #252 in the QS World University Rankings 2025. HIT does not operate a
  formal public developer portal, but its Elsevier Pure research portal
  (scholar.hit.edu.cn) exposes standard machine-readable interfaces: an OAI-PMH
  endpoint (verified live, OpenAIRE CERIF 1.2 profile) and RSS feeds of research
  outputs and researcher profiles. Most other institutional systems (library OPAC,
  institutional repository, student/SSO systems) are gated and do not publish open,
  documented APIs.
